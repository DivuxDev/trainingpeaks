server {
    listen 80;

    location /api/ {
        resolver           127.0.0.11 valid=30s;
        set $upstream      http://api:8000;
        proxy_pass         $upstream/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    location / {
        root  /usr/share/nginx/html;
        index index.html;
    }
}
